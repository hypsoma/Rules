name: Sync Quantumult Resources

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync resources
        run: python3 scripts/sync_quantumult_resources.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No updates detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add filter rewrite sources.json
          git commit -m "chore: sync quantumult resources"
          git push
